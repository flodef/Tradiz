appId: fr.tradiz.app
productName: Tradiz
copyright: Copyright © 2024 Tradiz
publish:
    provider: github
    owner: flodef
    repo: Tradiz
    releaseType: release
directories:
    output: dist
files:
    - electron/**/*
    - package.json
    - '!node_modules'
    - '!src'
    - '!__tests__'
    - '!scripts'
    - '!coverage'
    - '!dist'
    - '!out'
    - '!build'
    - '!*.log'
    - '!.env*.local'
extraResources:
    - from: .next/standalone
      to: standalone
      filter:
          - '**/*'
    - from: electron/drivers
      to: drivers
      filter:
          - '**/*'
asar: false
npmRebuild: false
nodeGypRebuild: false
win:
    target:
        - target: nsis
          arch:
              - x64
    artifactName: ${productName}-${version}-win.${ext}
    icon: public/icons/icons-512.png
nsis:
    oneClick: false
    perMachine: false
    allowToChangeInstallationDirectory: true
    uninstallDisplayName: Tradiz
    createDesktopShortcut: true
    createStartMenuShortcut: true
    shortcutName: Tradiz
mac:
    target:
        - dmg
    icon: public/icons/icons-512.png
linux:
    target:
        - AppImage
        - deb
    icon: public/icons/icons-512.png
